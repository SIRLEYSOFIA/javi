<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cronograma de Eventos - Grupo Timoteo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a0533 0%, #0d1b3e 50%, #0a2a2f 100%);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background particles */
    .bg-particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-particles span {
      position: absolute;
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0.15;
    }
    @keyframes float {
      0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.15; }
      90% { opacity: 0.15; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 15px 40px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 2.4em;
      font-weight: 900;
      background: linear-gradient(90deg, #f97316, #facc15, #f97316);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 3s linear infinite;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }
    .header .subtitle {
      color: #94a3b8;
      font-size: 0.95em;
      font-style: italic;
      margin-top: 6px;
    }
    .header .page-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(139, 92, 246, 0.2);
      border: 1px solid rgba(139, 92, 246, 0.4);
      color: #c4b5fd;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: 700;
      margin-top: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .page-badge svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* Cards Grid */
    .cards-section {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 30px;
    }
    .cards-section h2 {
      text-align: center;
      font-size: 1.3em;
      font-weight: 800;
      color: #e2e8f0;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .event-card {
      display: flex;
      align-items: stretch;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s, box-shadow 0.3s;
      animation: card-slide 0.6s ease-out both;
    }
    .event-card:nth-child(1) { animation-delay: 0.05s; }
    .event-card:nth-child(2) { animation-delay: 0.1s; }
    .event-card:nth-child(3) { animation-delay: 0.15s; }
    .event-card:nth-child(4) { animation-delay: 0.2s; }
    .event-card:nth-child(5) { animation-delay: 0.25s; }
    .event-card:nth-child(6) { animation-delay: 0.3s; }
    .event-card:nth-child(7) { animation-delay: 0.35s; }

    .event-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }

    @keyframes card-slide {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .event-card img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    /* Navigation buttons */
    .nav-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
    }
    .cta-button {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, #f97316, #facc15);
      color: #1a0533;
      font-family: 'Nunito', sans-serif;
      font-size: 1em;
      font-weight: 800;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
    }
    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(249, 115, 22, 0.5);
    }
    .cta-button:active {
      transform: translateY(0);
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 40px;
      padding: 20px;
      color: #475569;
      font-size: 0.8em;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .header h1 { font-size: 1.6em; }
      .cta-button {
        padding: 12px 24px;
        font-size: 0.9em;
      }
    }
  </style>
</head>

<body>
  <!-- Background particles -->
  <div class="bg-particles" id="particles"></div>

  <div class="container">
    <!-- Header -->
    <div class="header">
      <h1>Grupo Timoteo</h1>
      <p class="subtitle">"Ninguno tenga en poco tu juventud..." 1 Timoteo 4:12</p>
      <div class="page-badge">
        <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/></svg>
        Cronograma de Eventos
      </div>
    </div>

    <!-- Event Cards -->
    <div class="cards-section">
      <div class="event-card">
        <img src="https://lh3.googleusercontent.com/d/19bFCN8MIJ1ymlNYeMqzGmzEHNpeDjKiw" alt="Evento 1" loading="lazy">
      </div>
      <div class="event-card">
        <img src="https://lh3.googleusercontent.com/d/1gu3sqlWDVhtVIGMY2XWn3ItFAMum_mJa" alt="Evento 2" loading="lazy">
      </div>
      <div class="event-card">
        <img src="https://lh3.googleusercontent.com/d/1NGhNHSSBejNCrXudgJkukQm1k5o9b890" alt="Evento 3" loading="lazy">
      </div>
      <div class="event-card">
        <img src="https://lh3.googleusercontent.com/d/1egylar6i3lziuT-4VTiUO8c0lLRiDTJb" alt="Evento 4" loading="lazy">
      </div>
      <div class="event-card">
        <img src="https://lh3.googleusercontent.com/d/1gQDERHznBSRjOoftjgOPWmvYd8Yo6chW" alt="Evento 5" loading="lazy">
      </div>
      <div class="event-card">
        <img src="https://lh3.googleusercontent.com/d/12r5iL4sAneGBlmBrjVT6U1lfnPQ3jLsU" alt="Evento 6" loading="lazy">
      </div>
      <div class="event-card">
        <img src="https://lh3.googleusercontent.com/d/1D9RwlIutJ2rEyJBQg2IsSZ1abVCC-wmQ" alt="Evento 7" loading="lazy">
      </div>
    </div>

    <!-- Navigation -->
    <div class="nav-buttons">
      <a class="cta-button" href="index.html">&larr; Ranking en vivo</a>
      <a class="cta-button" href="puntuacion.html">Ver puntuación completa</a>
    </div>

    <div class="footer">
      Grupo Timoteo &bull; Cronograma de Eventos
    </div>
  </div>

  <script>
    // Create background particles
    function createParticles() {
      const container = document.getElementById('particles');
      const colors = ['#f97316', '#facc15', '#8b5cf6', '#3b82f6', '#10b981', '#ef4444'];
      for (let i = 0; i < 20; i++) {
        const span = document.createElement('span');
        const size = Math.random() * 15 + 5;
        span.style.width = size + 'px';
        span.style.height = size + 'px';
        span.style.left = Math.random() * 100 + '%';
        span.style.background = colors[Math.floor(Math.random() * colors.length)];
        span.style.animationDuration = (Math.random() * 15 + 10) + 's';
        span.style.animationDelay = (Math.random() * 10) + 's';
        container.appendChild(span);
      }
    }
    createParticles();
  </script>
</body>
</html>
